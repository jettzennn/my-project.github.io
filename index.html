<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Akhmad Hadi - Digital Space</title>
        <!-- Hubungkan ke file CSS eksternal -->
        <link rel="stylesheet" href="style.css" />
        <!-- Font Awesome untuk Icon Media Sosial -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
    </head>
    <body>
        <!-- Container Utama: Mensimulasikan Layar Smartphone -->
        <div class="phone-container">
            <!-- ================= MAIN CONTENT ================= -->
            <main class="main-content">
                <!-- Hero Title -->
                <div class="hero-section">
                    <h1 class="main-title">Akhmad Hadi</h1>
                    <p class="subtitle">WELCOME TO MY DIGITAL SPACE. 🎮</p>
                </div>

                <!-- SOSMED GRID KE SAMPING -->
                <div class="social-row">
                    <a
                        href="https://github.com/"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="social-box gh"
                        title="GitHub"
                        ><i class="fab fa-github"></i
                    ></a>
                    <a
                        href="https://discord.com/"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="social-box dc"
                        title="Discord"
                        ><i class="fab fa-discord"></i
                    ></a>
                    <a
                        href="https://instagram.com/"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="social-box ig"
                        title="Instagram"
                        ><i class="fab fa-instagram"></i
                    ></a>
                    <a
                        href="https://wa.me/"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="social-box wa"
                        title="WhatsApp"
                        ><i class="fab fa-whatsapp"></i
                    ></a>
                    <a
                        href="mailto:your-email@gmail.com"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="social-box gm"
                        title="Gmail"
                        ><i class="far fa-envelope"></i
                    ></a>
                    <!-- Di bawah ini yang sudah diperbaiki dari telegram-f menjadi telegram -->
                    <a
                        href="https://t.me/"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="social-box tg"
                        title="Telegram"
                        ><i class="fab fa-telegram"></i
                    ></a>
                </div>

                <!-- JUDUL SECTION: SEKARANG SUDAH DI TENGAH -->
                <div class="section-pixel-title">MY PROJECTS</div>

                <!-- LIST PROJECT: TEMPLATE POLOSAN (TINGGAL GANTI TEKS & HREF SAJA) -->
                <div class="project-list">
                    <!-- Kamu bebas ganti tulisan "PROJECT NAME HERE" tanpa perlu ubah CSS -->
                    <a
                        href="./jettzcomix/index.html"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="retro-btn btn-pink"
                        >Baca Komik (JettZComix)</a
                    >
                    <a
                        href="https://link-eksternal-kamu.com"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="retro-btn btn-yellow"
                        >PROJECT NAME HERE</a
                    >
                    <a
                        href="https://link-eksternal-kamu.com"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="retro-btn btn-blue"
                        >PROJECT NAME HERE</a
                    >
                    <a
                        href="https://link-eksternal-kamu.com"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="retro-btn btn-purple"
                        >PROJECT NAME HERE</a
                    >
                    <a
                        href="https://link-eksternal-kamu.com"
                        target="_blank"
                        rel="noopener noreferrer"
                        class="retro-btn btn-teal"
                        >PROJECT NAME HERE</a
                    >
                </div>
            </main>
        </div>

        <!-- Hubungkan ke file JavaScript eksternal -->
        <script src="script.js"></script>
    </body>
</html>
